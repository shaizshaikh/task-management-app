apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: task-management
data:
  # Database
  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_NAME: "task_management"
  DB_USER: "taskuser"
  
  # Keycloak - Internal (container-to-container)
  KEYCLOAK_URL: "http://keycloak-service:8080"
  KEYCLOAK_REALM: "task-management"
  KEYCLOAK_CLIENT_ID: "task-management-frontend"
  KEYCLOAK_ADMIN_USERNAME: "admin"
  KEYCLOAK_ADMIN_CLIENT_ID: "admin-cli"
  
  # React App (build-time)
  REACT_APP_KEYCLOAK_REALM: "task-management"
  REACT_APP_KEYCLOAK_CLIENT_ID: "task-management-frontend"
  
  # Application URLs
  FRONTEND_URL: "https://shaiztech.work.gd"
  
  # Backend Port
  BACKEND_PORT: "5000"
  
  # SMTP Configuration
  SMTP_HOST: "in-v3.mailjet.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  SMTP_FROM: "noreply@shaiztech.work.gd"
