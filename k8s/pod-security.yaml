# Pod Security Standards and RBAC
# Implements security best practices for all pods

apiVersion: v1
kind: ServiceAccount
metadata:
  name: task-management-sa
  namespace: task-management
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: task-management
  name: task-management-role
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: task-management-rolebinding
  namespace: task-management
subjects:
- kind: ServiceAccount
  name: task-management-sa
  namespace: task-management
roleRef:
  kind: Role
  name: task-management-role
  apiGroup: rbac.authorization.k8s.io
---
# Pod Security Policy (if supported by cluster)
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: task-management-psp
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'