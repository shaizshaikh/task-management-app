server {
    listen 80;
    server_name localhost 0.0.0.0 shaiztech.work.gd *.shaiztech.work.gd;

    # ----------------------------
    # Frontend (React) - Direct Serve with SPA Support
    # ----------------------------
    location / {
        proxy_pass http://frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Handle proxy errors by serving index.html for SPA routing
        proxy_intercept_errors on;
        error_page 502 503 504 = @fallback;
    }
    
    # Fallback for SPA routing when frontend container is not responding
    location @fallback {
        return 302 /;
    }

    # ----------------------------
    # API Requests Proxy
    # ----------------------------
    location /api {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # ----------------------------
    # WebSocket (Socket.IO) Proxy
    # ----------------------------
    location /socket.io/ {
        proxy_pass http://backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
