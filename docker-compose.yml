services:
  # Frontend (React -> built and served via nginx inside its container)
  frontend:
    build: ./frontend
    container_name: task-frontend
    # NO EXTERNAL PORTS - Internal only
    environment:
      - REACT_APP_KEYCLOAK_REALM=${REACT_APP_KEYCLOAK_REALM}
      - REACT_APP_KEYCLOAK_CLIENT_ID=${REACT_APP_KEYCLOAK_CLIENT_ID}
    networks:
      - app-network

  # Backend (Node.js/Express + Socket.IO)
  backend:
    build: ./backend
    container_name: task-backend
    # NO EXTERNAL PORTS - Internal only
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_EXTERNAL_URL=${KEYCLOAK_EXTERNAL_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_ADMIN_USERNAME=${KEYCLOAK_ADMIN_USERNAME}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KEYCLOAK_ADMIN_CLIENT_ID=${KEYCLOAK_ADMIN_CLIENT_ID}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      database:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - app-network

  # Database (MySQL) - Internal only
  database:
    image: mysql:8.0
    container_name: task_management_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    # NO EXTERNAL PORTS - Internal only
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init-schema.sql:/docker-entrypoint-initdb.d/init-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  # Keycloak (Authentication Server) - Internal only, proxied via Nginx
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: task-keycloak
    # NO EXTERNAL PORTS - Internal only
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_USERNAME}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=dev-file
      - KC_HEALTH_ENABLED=true
      - KC_PROXY=edge
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/auth
      - KC_HOSTNAME_URL=http://localhost:8080/auth
      - KC_HOSTNAME_ADMIN_URL=http://localhost:8080/auth
      - KC_HOSTNAME_PORT=8080
    command: start-dev --import-realm --http-relative-path=/auth
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - app-network

  # Nginx (Reverse Proxy) - ONLY EXPOSED SERVICE
  nginx:
    image: nginx:alpine
    container_name: task-nginx
    ports:
      - "${NGINX_PORT}:80"  # ONLY external port
    volumes:
      - ./nginx/myapp.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
      - keycloak
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  keycloak_data:
