name: Backend CI/CD

permissions:
  contents: write

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - 'k8s/backend.yaml'
      - '.github/workflows/backend-ci.yml'

  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]
      target_branch:
        description: Target branch for deployment
        required: true
        default: dev
        type: choice
        options: [dev, main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/taskmanagement-backend
  DOCKER_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKER_REPO: taskmanagement-backend
  DOCKERFILE_PATH: ./backend/Dockerfile
  BUILD_CONTEXT: ./backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------------------------
      # 🔍 Resolve latest Docker Hub version (safe)
      # --------------------------------------------------
      - name: Get latest Docker Hub version
        id: dockerhub_version
        shell: bash
        run: |
          set -euo pipefail

          URL="https://hub.docker.com/v2/repositories/${DOCKER_NAMESPACE}/${DOCKER_REPO}/tags?page_size=100"
          RESPONSE="$(curl -fsSL "$URL" || true)"

          if [[ -z "$RESPONSE" ]]; then
            LATEST="0.0.0"
          else
            TAGS="$(echo "$RESPONSE" \
              | jq -r '.results // [] | .[].name' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)"

            if [[ -z "$TAGS" ]]; then
              LATEST="0.0.0"
            else
              LATEST="$(echo "$TAGS" | sed 's/^v//' | sort -V | tail -n 1)"
            fi
          fi

          echo "current_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Using current version: v$LATEST"

      # --------------------------------------------------
      # 🔢 Semantic version bump
      # --------------------------------------------------
      - name: Calculate next version
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          CURRENT="${{ steps.dockerhub_version.outputs.current_version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"

          case "$BUMP" in
            major) ((MAJOR++)); MINOR=0; PATCH=0 ;;
            minor) ((MINOR++)); PATCH=0 ;;
            patch) ((PATCH++)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: v$NEW_VERSION"

      # --------------------------------------------------
      # 🐳 Docker build & push
      # --------------------------------------------------
      - uses: docker/setup-buildx-action@v3

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}
            ${{ env.IMAGE_NAME }}:latest

      # --------------------------------------------------
      # 📝 Update Kubernetes manifest
      # --------------------------------------------------
      - name: Update backend image tag
        shell: bash
        run: |
          set -euo pipefail
          sed -i -E "s|(^\s*image:\s*).+|\1${IMAGE_NAME}:v${{ steps.semver.outputs.new_version }}|" k8s/backend.yaml

      # --------------------------------------------------
      # ✅ Validate manifest
      # --------------------------------------------------
      - name: Validate k8s YAML
        run: |
          python3 - <<EOF
          import yaml
          yaml.safe_load(open("k8s/backend.yaml"))
          print("YAML valid")
          EOF

      # --------------------------------------------------
      # 🚀 Commit & push to dev
      # --------------------------------------------------
      - name: Commit manifest update
        if: github.ref == 'refs/heads/dev'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/backend.yaml
          git diff --staged --quiet || git commit -m "chore(backend): deploy v${{ steps.semver.outputs.new_version }} [skip ci]"
          git push origin dev

      # --------------------------------------------------
      # 📦 Summary
      # --------------------------------------------------
      - name: Job summary
        run: |
          {
            echo "## Backend CI/CD Complete"
            echo ""
            echo "- Previous: v${{ steps.dockerhub_version.outputs.current_version }}"
            echo "- New: v${{ steps.semver.outputs.new_version }}"
            echo "- Image: ${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}"
          } >> "$GITHUB_STEP_SUMMARY"
