name: Backend CI/CD

on:
  push:
    branches:
      - dev  # Only trigger on dev branch
    paths:
      - 'backend/**'
      - 'k8s/backend.yaml'  # Track K8s manifest changes too
      - '.github/workflows/backend-ci.yml'

  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      target_branch:
        description: 'Target branch for deployment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/taskmanagement-backend
  DOCKERFILE_PATH: ./backend/Dockerfile
  BUILD_CONTEXT: ./backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Prevent infinite loops from bot commits
    if: github.actor != 'github-actions[bot]'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version from k8s yaml
        id: get_version
        run: |
          # Extract current version from k8s/backend.yaml
          # Using more precise regex to avoid false matches
          CURRENT_VERSION=$(grep -oP "image:\s*\S+/taskmanagement-backend:v\K[0-9]+\.[0-9]+\.[0-9]+" k8s/backend.yaml || echo "0.0.0")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Current version: v$CURRENT_VERSION"

      - name: Calculate new version
        id: semver
        run: |
          CURRENT="${{ steps.get_version.outputs.current_version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          # Determine bump type
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"
          if [ -z "$BUMP_TYPE" ]; then
            BUMP_TYPE="patch"
          fi
          
          # Increment version based on bump type
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "🚀 New version: v$NEW_VERSION (bump: $BUMP_TYPE)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=v${{ steps.semver.outputs.new_version }}

      - name: Update k8s backend.yaml with new image tag
        run: |
          NEW_VERSION="v${{ steps.semver.outputs.new_version }}"
          
          # More precise sed that only matches the exact image line
          sed -i -E "s|(image:\s*)\S+/taskmanagement-backend:v[0-9]+\.[0-9]+\.[0-9]+|\1${{ env.IMAGE_NAME }}:${NEW_VERSION}|g" k8s/backend.yaml
          
          echo "✅ Updated k8s/backend.yaml:"
          grep "image:" k8s/backend.yaml | grep backend

      - name: Validate updated K8s manifest
        run: |
          # Verify the sed operation succeeded
          if ! grep -q "image:.*taskmanagement-backend:v${{ steps.semver.outputs.new_version }}" k8s/backend.yaml; then
            echo "❌ ERROR: Failed to update image tag in k8s/backend.yaml"
            exit 1
          fi
          
          # Validate YAML syntax using kubectl dry-run
          if command -v kubectl &> /dev/null; then
            echo "🔍 Validating YAML syntax with kubectl..."
            kubectl apply --dry-run=client -f k8s/backend.yaml
            echo "✅ YAML validation passed"
          else
            echo "⚠️ kubectl not available, skipping YAML validation"
            # Basic YAML syntax check as fallback
            if ! python3 -c "import yaml; yaml.safe_load(open('k8s/backend.yaml'))" 2>/dev/null; then
              echo "❌ ERROR: Invalid YAML syntax"
              exit 1
            fi
          fi

      - name: Commit and push changes directly to dev
        if: github.ref == 'refs/heads/dev'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add k8s/backend.yaml
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "⚠️ No changes to commit"
          else
            git commit -m "chore(backend): update image to v${{ steps.semver.outputs.new_version }} [skip ci]"
            git push origin dev
            echo "✅ Changes pushed to dev branch"
          fi

      - name: Create Pull Request to main
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_branch == 'main'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(backend): update image to v${{ steps.semver.outputs.new_version }}"
          title: "🚀 Backend: Deploy v${{ steps.semver.outputs.new_version }} to Production"
          body: |
            ## Backend Production Deployment
            
            **New Version:** `v${{ steps.semver.outputs.new_version }}`
            **Previous Version:** `v${{ steps.get_version.outputs.current_version }}`
            **Branch:** `dev` → `main`
            
            ### Changes
            - Built and pushed `${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}`
            - Updated `k8s/backend.yaml` with new image tag
            
            ### Docker Image
            ```bash
            docker pull ${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}
            ```
            
            ### Testing
            - [ ] Backend health check passed
            - [ ] API endpoints verified
            - [ ] Database connections working
            
            ### Deployment
            This PR will update the production K8s manifest. After merge:
            ```bash
            kubectl apply -f k8s/backend.yaml
            ```
            
            Or if using ArgoCD, sync will happen automatically.
            
            ---
            *Auto-generated by Backend CI/CD workflow*
          branch: backend-deploy-v${{ steps.semver.outputs.new_version }}
          base: main
          delete-branch: true
          labels: |
            backend
            production
            deployment
            automated

      - name: Summary
        run: |
          echo "## 🎉 Backend Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.semver.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            echo "### ✅ Auto-deployed to dev" >> $GITHUB_STEP_SUMMARY
            echo "K8s manifest updated and committed to dev branch" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 📋 Next Steps:" >> $GITHUB_STEP_SUMMARY
            echo "1. Review and merge the Pull Request to main" >> $GITHUB_STEP_SUMMARY
            echo "2. Deploy to production Kubernetes cluster" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🐳 Pull Image:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY