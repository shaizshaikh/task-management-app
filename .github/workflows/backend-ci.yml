name: Backend CI/CD

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - 'k8s/backend.yaml'
      - '.github/workflows/backend-ci.yml'

  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      target_branch:
        description: 'Target branch for deployment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/taskmanagement-backend
  DOCKER_REPO: taskmanagement-backend
  DOCKER_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERFILE_PATH: ./backend/Dockerfile
  BUILD_CONTEXT: ./backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # 🔍 Get latest version from Docker Hub
      # -----------------------------
      - name: Get latest version from Docker Hub
        id: dockerhub_version
        run: |
          echo "🔍 Fetching tags from Docker Hub..."

          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/${DOCKER_NAMESPACE}/${DOCKER_REPO}/tags?page_size=100" \
            | jq -r '.results[].name' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's/^v//' || true)

          if [ -z "$TAGS" ]; then
            LATEST="0.0.0"
            echo "⚠️ No versioned tags found. Using v0.0.0"
          else
            LATEST=$(echo "$TAGS" | sort -V | tail -n 1)
            echo "📦 Latest tag on Docker Hub: v$LATEST"
          fi

          echo "current_version=$LATEST" >> $GITHUB_OUTPUT

      # -----------------------------
      # 🔢 Calculate next semantic version
      # -----------------------------
      - name: Calculate new version
        id: semver
        run: |
          CURRENT="${{ steps.dockerhub_version.outputs.current_version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ github.event.inputs.version_bump }}"
          [ -z "$BUMP" ] && BUMP="patch"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "🚀 New version: v$NEW_VERSION"

      # -----------------------------
      # 🐳 Docker build & push
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=v${{ steps.semver.outputs.new_version }}

      # -----------------------------
      # 📝 Update K8s manifest
      # -----------------------------
      - name: Update k8s/backend.yaml
        run: |
          sed -i -E "s|(image:\s*).+|\1${IMAGE_NAME}:v${{ steps.semver.outputs.new_version }}|" k8s/backend.yaml
          echo "✅ Updated manifest:"
          grep image: k8s/backend.yaml

      # -----------------------------
      # ✅ Validate YAML
      # -----------------------------
      - name: Validate K8s manifest
        run: |
          python3 - <<EOF
          import yaml
          yaml.safe_load(open("k8s/backend.yaml"))
          print("✅ YAML is valid")
          EOF

      # -----------------------------
      # 🚀 Commit & push to dev
      # -----------------------------
      - name: Commit and push
        if: github.ref == 'refs/heads/dev'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/backend.yaml
          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit"
          else
            git commit -m "chore(backend): deploy v${{ steps.semver.outputs.new_version }} [skip ci]"
            git push origin dev
          fi

      # -----------------------------
      # 📦 Summary
      # -----------------------------
      - name: Summary
        run: |
          echo "## ✅ Backend CI Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Previous:** v${{ steps.dockerhub_version.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**New:** v${{ steps.semver.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
