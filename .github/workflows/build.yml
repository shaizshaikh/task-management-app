name: Build Images

permissions:
  contents: read

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'

  workflow_dispatch:
    inputs:
      component:
        description: Component to build
        required: true
        type: choice
        options: [backend, frontend, both]
      version_bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  # --------------------------------------------------
  # Detect which components changed
  # --------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # --------------------------------------------------
  # Build Backend
  # --------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' || 
      github.event.inputs.component == 'backend' || 
      github.event.inputs.component == 'both'
    outputs:
      version: ${{ steps.semver.outputs.new_version }}
      image: ${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}
    
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/taskmanagement-backend
      DOCKER_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_REPO: taskmanagement-backend
      DOCKERFILE_PATH: ./backend/Dockerfile
      BUILD_CONTEXT: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest Docker Hub version
        id: dockerhub_version
        shell: bash
        run: |
          set -euo pipefail

          URL="https://hub.docker.com/v2/repositories/${DOCKER_NAMESPACE}/${DOCKER_REPO}/tags?page_size=100"
          
          echo "Fetching tags from Docker Hub..."
          RESPONSE="$(curl -fsSL "$URL" 2>/dev/null || echo '{}')"

          if [[ -z "$RESPONSE" ]] || [[ "$RESPONSE" == "{}" ]]; then
            echo "No response from Docker Hub, using default version"
            LATEST="0.0.0"
          else
            TAGS="$(echo "$RESPONSE" \
              | jq -r '.results // [] | .[].name' 2>/dev/null \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || echo "")"

            if [[ -z "$TAGS" ]]; then
              echo "No semantic version tags found, starting at 0.0.0"
              LATEST="0.0.0"
            else
              LATEST="$(echo "$TAGS" | sed 's/^v//' | sort -V | tail -n 1)"
              echo "Found latest version: v$LATEST"
            fi
          fi

          echo "current_version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          CURRENT="${{ steps.dockerhub_version.outputs.current_version }}"
          
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '$CURRENT', defaulting to 0.0.0"
            CURRENT="0.0.0"
          fi
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          MAJOR=$((10#$MAJOR))
          MINOR=$((10#$MINOR))
          PATCH=$((10#$PATCH))

          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Backend version: v$NEW_VERSION (was: v$CURRENT)"

      - uses: docker/setup-buildx-action@v3

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Summary
        run: |
          echo "### Backend Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Version: v${{ steps.semver.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------
  # Build Frontend
  # --------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' || 
      github.event.inputs.component == 'frontend' || 
      github.event.inputs.component == 'both'
    outputs:
      version: ${{ steps.semver.outputs.new_version }}
      image: ${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}
    
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/taskmanagement-frontend
      DOCKER_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_REPO: taskmanagement-frontend
      DOCKERFILE_PATH: ./frontend/Dockerfile
      BUILD_CONTEXT: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest Docker Hub version
        id: dockerhub_version
        shell: bash
        run: |
          set -euo pipefail

          URL="https://hub.docker.com/v2/repositories/${DOCKER_NAMESPACE}/${DOCKER_REPO}/tags?page_size=100"
          
          echo "Fetching tags from Docker Hub..."
          RESPONSE="$(curl -fsSL "$URL" 2>/dev/null || echo '{}')"

          if [[ -z "$RESPONSE" ]] || [[ "$RESPONSE" == "{}" ]]; then
            echo "No response from Docker Hub, using default version"
            LATEST="0.0.0"
          else
            TAGS="$(echo "$RESPONSE" \
              | jq -r '.results // [] | .[].name' 2>/dev/null \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || echo "")"

            if [[ -z "$TAGS" ]]; then
              echo "No semantic version tags found, starting at 0.0.0"
              LATEST="0.0.0"
            else
              LATEST="$(echo "$TAGS" | sed 's/^v//' | sort -V | tail -n 1)"
              echo "Found latest version: v$LATEST"
            fi
          fi

          echo "current_version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          CURRENT="${{ steps.dockerhub_version.outputs.current_version }}"
          
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '$CURRENT', defaulting to 0.0.0"
            CURRENT="0.0.0"
          fi
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          MAJOR=$((10#$MAJOR))
          MINOR=$((10#$MINOR))
          PATCH=$((10#$PATCH))

          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Frontend version: v$NEW_VERSION (was: v$CURRENT)"

      - uses: docker/setup-buildx-action@v3

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Summary
        run: |
          echo "### Frontend Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Version: v${{ steps.semver.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------
  # Summary - Manual Deploy Trigger
  # --------------------------------------------------
  deployment-ready:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    if: always() && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    steps:
      - name: Build Summary
        run: |
          {
            echo "## ✅ Build Complete - Ready for Deployment"
            echo ""
            echo "### Built Images"
            echo ""
            
            if [[ "${{ needs.build-backend.result }}" == "success" ]]; then
              echo "- **Backend**: v${{ needs.build-backend.outputs.version }}"
              echo "  - Image: \`${{ needs.build-backend.outputs.image }}\`"
            fi
            
            if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
              echo "- **Frontend**: v${{ needs.build-frontend.outputs.version }}"
              echo "  - Image: \`${{ needs.build-frontend.outputs.image }}\`"
            fi
            
            echo ""
            echo "### 🚀 Next Steps"
            echo ""
            echo "**Option 1: Automatic Deployment (Recommended)**"
            echo "1. Go to Settings → Actions → General"
            echo "2. Under 'Workflow permissions', select:"
            echo "   - ✅ Read and write permissions"
            echo "3. Re-run this workflow"
            echo ""
            echo "**Option 2: Manual Deployment**"
            echo "1. Go to Actions → Deploy to Kubernetes"
            echo "2. Click 'Run workflow'"
            echo "3. Fill in:"
            
            if [[ "${{ needs.build-backend.result }}" == "success" ]] && [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
              echo "   - Component: \`both\`"
              echo "   - Backend version: \`v${{ needs.build-backend.outputs.version }}\`"
              echo "   - Frontend version: \`v${{ needs.build-frontend.outputs.version }}\`"
            elif [[ "${{ needs.build-backend.result }}" == "success" ]]; then
              echo "   - Component: \`backend\`"
              echo "   - Backend version: \`v${{ needs.build-backend.outputs.version }}\`"
            else
              echo "   - Component: \`frontend\`"
              echo "   - Frontend version: \`v${{ needs.build-frontend.outputs.version }}\`"
            fi
            
            echo ""
            echo "---"
            echo ""
            echo "💡 **Tip**: Enable automatic deployments by following Option 1 above."
          } >> "$GITHUB_STEP_SUMMARY"
      
      - name: Try automatic trigger with GITHUB_TOKEN
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Attempting to trigger deploy workflow..."
          
          # Try with workflow_dispatch via API
          curl -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{
              "ref": "dev",
              "inputs": {
                "backend_built": "${{ needs.build-backend.result == 'success' }}",
                "frontend_built": "${{ needs.build-frontend.result == 'success' }}",
                "backend_version": "${{ needs.build-backend.outputs.version }}",
                "frontend_version": "${{ needs.build-frontend.outputs.version }}",
                "backend_image": "${{ needs.build-backend.outputs.image }}",
                "frontend_image": "${{ needs.build-frontend.outputs.image }}"
              }
            }' && echo "✅ Deploy workflow triggered!" || echo "⚠️  Auto-trigger failed - follow manual steps above"
