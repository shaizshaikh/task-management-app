name: Build and Deploy

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build-and-deploy.yml'

  workflow_dispatch:
    inputs:
      component:
        description: Component to build and deploy
        required: true
        type: choice
        options: [backend, frontend, both]
      version_bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  # --------------------------------------------------
  # Detect which components changed
  # --------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # --------------------------------------------------
  # Build Backend
  # --------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' || 
      github.event.inputs.component == 'backend' || 
      github.event.inputs.component == 'both'
    outputs:
      version: ${{ steps.semver.outputs.new_version }}
      image_tag: ${{ steps.semver.outputs.new_version }}
      docker_repo: ${{ steps.repo_info.outputs.docker_repo }}
    
    env:
      DOCKER_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_REPO: taskmanagement-backend
      DOCKERFILE_PATH: ./backend/Dockerfile
      BUILD_CONTEXT: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set repository info
        id: repo_info
        run: |
          echo "docker_repo=taskmanagement-backend" >> "$GITHUB_OUTPUT"

      - name: Get latest Docker Hub version
        id: dockerhub_version
        shell: bash
        run: |
          set -euo pipefail

          URL="https://hub.docker.com/v2/repositories/${DOCKER_NAMESPACE}/${DOCKER_REPO}/tags?page_size=100"
          
          echo "Fetching tags from Docker Hub..."
          RESPONSE="$(curl -fsSL "$URL" 2>/dev/null || echo '{}')"

          if [[ -z "$RESPONSE" ]] || [[ "$RESPONSE" == "{}" ]]; then
            echo "No response from Docker Hub, using default version"
            LATEST="0.0.0"
          else
            TAGS="$(echo "$RESPONSE" \
              | jq -r '.results // [] | .[].name' 2>/dev/null \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || echo "")"

            if [[ -z "$TAGS" ]]; then
              echo "No semantic version tags found, starting at 0.0.0"
              LATEST="0.0.0"
            else
              LATEST="$(echo "$TAGS" | sed 's/^v//' | sort -V | tail -n 1)"
              echo "Found latest version: v$LATEST"
            fi
          fi

          echo "current_version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          CURRENT="${{ steps.dockerhub_version.outputs.current_version }}"
          
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '$CURRENT', defaulting to 0.0.0"
            CURRENT="0.0.0"
          fi
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          MAJOR=$((10#$MAJOR))
          MINOR=$((10#$MINOR))
          PATCH=$((10#$PATCH))

          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Backend version: v$NEW_VERSION (was: v$CURRENT)"

      - uses: docker/setup-buildx-action@v3

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_REPO }}:v${{ steps.semver.outputs.new_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_REPO }}:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_REPO }}:latest
          cache-to: type=inline

  # --------------------------------------------------
  # Build Frontend
  # --------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' || 
      github.event.inputs.component == 'frontend' || 
      github.event.inputs.component == 'both'
    outputs:
      version: ${{ steps.semver.outputs.new_version }}
      image_tag: ${{ steps.semver.outputs.new_version }}
      docker_repo: ${{ steps.repo_info.outputs.docker_repo }}
    
    env:
      DOCKER_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_REPO: taskmanagement-frontend
      DOCKERFILE_PATH: ./frontend/Dockerfile
      BUILD_CONTEXT: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set repository info
        id: repo_info
        run: |
          echo "docker_repo=taskmanagement-frontend" >> "$GITHUB_OUTPUT"

      - name: Get latest Docker Hub version
        id: dockerhub_version
        shell: bash
        run: |
          set -euo pipefail

          URL="https://hub.docker.com/v2/repositories/${DOCKER_NAMESPACE}/${DOCKER_REPO}/tags?page_size=100"
          
          echo "Fetching tags from Docker Hub..."
          RESPONSE="$(curl -fsSL "$URL" 2>/dev/null || echo '{}')"

          if [[ -z "$RESPONSE" ]] || [[ "$RESPONSE" == "{}" ]]; then
            echo "No response from Docker Hub, using default version"
            LATEST="0.0.0"
          else
            TAGS="$(echo "$RESPONSE" \
              | jq -r '.results // [] | .[].name' 2>/dev/null \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || echo "")"

            if [[ -z "$TAGS" ]]; then
              echo "No semantic version tags found, starting at 0.0.0"
              LATEST="0.0.0"
            else
              LATEST="$(echo "$TAGS" | sed 's/^v//' | sort -V | tail -n 1)"
              echo "Found latest version: v$LATEST"
            fi
          fi

          echo "current_version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          CURRENT="${{ steps.dockerhub_version.outputs.current_version }}"
          
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '$CURRENT', defaulting to 0.0.0"
            CURRENT="0.0.0"
          fi
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          MAJOR=$((10#$MAJOR))
          MINOR=$((10#$MINOR))
          PATCH=$((10#$PATCH))

          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Frontend version: v$NEW_VERSION (was: v$CURRENT)"

      - uses: docker/setup-buildx-action@v3

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_REPO }}:v${{ steps.semver.outputs.new_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_REPO }}:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_REPO }}:latest
          cache-to: type=inline

  # --------------------------------------------------
  # Deploy to Kubernetes
  # --------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    if: always() && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: dev

      - name: Debug - Show received values
        run: |
          echo "=== Debug Information ==="
          echo "Backend result: ${{ needs.build-backend.result }}"
          echo "Backend version: ${{ needs.build-backend.outputs.version }}"
          echo "Backend image_tag: ${{ needs.build-backend.outputs.image_tag }}"
          echo "Backend docker_repo: ${{ needs.build-backend.outputs.docker_repo }}"
          echo ""
          echo "Frontend result: ${{ needs.build-frontend.result }}"
          echo "Frontend version: ${{ needs.build-frontend.outputs.version }}"
          echo "Frontend image_tag: ${{ needs.build-frontend.outputs.image_tag }}"
          echo "Frontend docker_repo: ${{ needs.build-frontend.outputs.docker_repo }}"
          echo "======================="

      - name: Update backend manifest
        if: needs.build-backend.result == 'success'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          REPO="${{ needs.build-backend.outputs.docker_repo }}"
          TAG="v${{ needs.build-backend.outputs.image_tag }}"
          FULL_IMAGE="${DOCKER_USERNAME}/${REPO}:${TAG}"
          
          echo "Updating backend manifest with: $FULL_IMAGE"
          sed -i -E "s|(^\s*image:\s*).+|\1${FULL_IMAGE}|" k8s/backend.yaml
          
          echo "=== Backend manifest after update ==="
          grep "image:" k8s/backend.yaml
          echo "===================================="

      - name: Update frontend manifest
        if: needs.build-frontend.result == 'success'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          REPO="${{ needs.build-frontend.outputs.docker_repo }}"
          TAG="v${{ needs.build-frontend.outputs.image_tag }}"
          FULL_IMAGE="${DOCKER_USERNAME}/${REPO}:${TAG}"
          
          echo "Updating frontend manifest with: $FULL_IMAGE"
          sed -i -E "s|(^\s*image:\s*).+|\1${FULL_IMAGE}|" k8s/frontend.yaml
          
          echo "=== Frontend manifest after update ==="
          grep "image:" k8s/frontend.yaml
          echo "====================================="

      - name: Validate manifests
        run: |
          if [[ "${{ needs.build-backend.result }}" == "success" ]]; then
            python3 -c "import yaml; yaml.safe_load(open('k8s/backend.yaml'))"
            echo "✅ Backend manifest valid"
          fi
          
          if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
            python3 -c "import yaml; yaml.safe_load(open('k8s/frontend.yaml'))"
            echo "✅ Frontend manifest valid"
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add changed files
          if [[ "${{ needs.build-backend.result }}" == "success" ]]; then
            git add k8s/backend.yaml
          fi
          
          if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
            git add k8s/frontend.yaml
          fi
          
          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Build commit message
            if [[ "${{ needs.build-backend.result }}" == "success" ]] && [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
              MSG="chore(k8s): deploy backend v${{ needs.build-backend.outputs.version }} and frontend v${{ needs.build-frontend.outputs.version }} [skip ci]"
            elif [[ "${{ needs.build-backend.result }}" == "success" ]]; then
              MSG="chore(k8s): deploy backend v${{ needs.build-backend.outputs.version }} [skip ci]"
            else
              MSG="chore(k8s): deploy frontend v${{ needs.build-frontend.outputs.version }} [skip ci]"
            fi
            
            git commit -m "$MSG"
            git push origin dev
            echo "✅ Changes committed and pushed"
          fi

      - name: Deployment summary
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          {
            echo "## 🚀 Deployment Complete"
            echo ""
            echo "| Component | Version | Image |"
            echo "|-----------|---------|-------|"
            
            if [[ "${{ needs.build-backend.result }}" == "success" ]]; then
              IMAGE="${DOCKER_USERNAME}/${{ needs.build-backend.outputs.docker_repo }}:v${{ needs.build-backend.outputs.image_tag }}"
              echo "| Backend | v${{ needs.build-backend.outputs.version }} | \`${IMAGE}\` |"
            fi
            
            if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
              IMAGE="${DOCKER_USERNAME}/${{ needs.build-frontend.outputs.docker_repo }}:v${{ needs.build-frontend.outputs.image_tag }}"
              echo "| Frontend | v${{ needs.build-frontend.outputs.version }} | \`${IMAGE}\` |"
            fi
            
            echo ""
            echo "✅ All changes committed to \`dev\` branch"
          } >> "$GITHUB_STEP_SUMMARY"